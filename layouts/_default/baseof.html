<!DOCTYPE html>
<html lang="en">
<head>
	{{- partial "head.html" . -}}
</head>
<body class="min-h-screen flex flex-col overflow-y-scroll bg-white text-gray-900">
	{{- partial "header.html" . -}}
	<main class="flex-1">
		{{- block "main" . }}{{ end -}}
	</main>
	{{- partial "footer.html" . -}}
	{{ $js := resources.Get "ts/main.ts" | js.Build (dict "minify" hugo.IsProduction) | fingerprint }}
	<script src="{{ $js.RelPermalink }}" defer></script>
</body>
</html>
