{{ define "main" }}
<div class="max-w-screen-xl w-full mx-auto px-4 py-8 animate-fade-in-up">
	<h1 class="text-2xl font-bold text-neutral-900 mb-2">Platforms</h1>
	<p class="text-neutral-500 mb-6">Browse digital signage products by supported platform</p>
	<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
		{{ range .Data.Terms.ByCount }}
		<a href="{{ .Page.RelPermalink }}" class="block p-6 bg-white border border-neutral-200 rounded-lg hover:border-primary-300 hover-lift transition-colors">
			<div class="flex items-center gap-3 mb-2">
				<div class="w-10 h-10 rounded-lg bg-success-50 flex items-center justify-center">
					<svg class="w-5 h-5 text-success-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
				</div>
				<h2 class="font-semibold text-neutral-900">{{ .Page.Title }}</h2>
			</div>
			<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-neutral-100 text-neutral-600">{{ .Count }} products</span>
		</a>
		{{ end }}
	</div>
</div>
{{ end }}
