<header class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-b border-neutral-200/60">
	<div class="max-w-screen-xl w-full mx-auto px-4 h-16 flex items-center justify-between">
		{{/* Logo */}}
		<a href="/" class="flex items-center gap-2.5 shrink-0">
			<div class="w-8 h-8 rounded-lg bg-primary-600 flex items-center justify-center text-white font-bold text-sm">SL</div>
			<span class="font-semibold text-neutral-900 text-lg">SignageList</span>
		</a>

		{{/* Desktop nav */}}
		<nav class="hidden md:flex items-center gap-8">
			<a href="/" class="text-sm font-medium text-neutral-600 hover:text-neutral-900 transition-colors">Directory</a>
			<a href="/categories/" class="text-sm font-medium text-neutral-600 hover:text-neutral-900 transition-colors">Categories</a>
			<a href="/platforms/" class="text-sm font-medium text-neutral-600 hover:text-neutral-900 transition-colors">Platforms</a>
			<a href="/news/" class="text-sm font-medium text-neutral-600 hover:text-neutral-900 transition-colors">News</a>
			<a href="/about/" class="text-sm font-medium text-neutral-600 hover:text-neutral-900 transition-colors">About</a>
		</nav>

		{{/* Right side */}}
		<div class="flex md:hidden items-center gap-3">
			{{/* Mobile hamburger */}}
			<button id="mobile-menu-toggle" aria-expanded="false" class="md:hidden flex items-center justify-center w-9 h-9 rounded-lg text-neutral-500 hover:text-neutral-700 hover:bg-neutral-100 transition-colors" aria-label="Menu">
				<svg id="menu-icon-open" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
				<svg id="menu-icon-close" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
			</button>
		</div>
	</div>

	{{/* Mobile menu panel */}}
	<div id="mobile-menu" class="hidden md:hidden border-t border-neutral-200/60 bg-white/95 backdrop-blur-lg animate-slide-down">
		<nav class="max-w-screen-xl mx-auto px-4 py-4 flex flex-col gap-1">
			<a href="/" class="px-3 py-2.5 text-sm font-medium text-neutral-700 hover:bg-neutral-100 rounded-lg transition-colors">Directory</a>
			<a href="/categories/" class="px-3 py-2.5 text-sm font-medium text-neutral-700 hover:bg-neutral-100 rounded-lg transition-colors">Categories</a>
			<a href="/platforms/" class="px-3 py-2.5 text-sm font-medium text-neutral-700 hover:bg-neutral-100 rounded-lg transition-colors">Platforms</a>
			<a href="/news/" class="px-3 py-2.5 text-sm font-medium text-neutral-700 hover:bg-neutral-100 rounded-lg transition-colors">News</a>
			<a href="/about/" class="px-3 py-2.5 text-sm font-medium text-neutral-700 hover:bg-neutral-100 rounded-lg transition-colors">About</a>
		</nav>
	</div>
</header>
