<script type="application/ld+json">
{
	"@context": "https://schema.org",
	"@type": "ItemList",
	"numberOfItems": {{ len .Pages }},
	"itemListElement": [
		{{ range $i, $page := .Pages.ByTitle }}{{ if $i }},{{ end }}
		{
			"@type": "ListItem",
			"position": {{ add $i 1 }},
			"url": "{{ $page.Permalink }}",
			"name": "{{ $page.Title }}"
		}
		{{ end }}
	]
}
</script>
